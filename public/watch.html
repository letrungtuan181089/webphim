<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Xem phim</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
    }

    h1 {
      padding: 20px;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      margin: 20px;
    }

    .video-container iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

<h1 id="title"></h1>

<div class="video-container">
  <iframe id="player" allow="autoplay" allowfullscreen></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("/api/movies")
  .then(res => res.json())
  .then(data => {
    const movie = data.find(m => m.id === id);
    if (movie) {
      document.getElementById("title").innerText = movie.title;
      document.getElementById("player").src =
        `https://drive.google.com/file/d/${movie.driveId}/preview`;
    }
  });
</script>

</body>
</html>
