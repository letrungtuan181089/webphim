<!DOCTYPE html>
<html>
<head>
  <title>Xem phim</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: 90vh;
    }

    a {
      color: white;
      padding: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>

<a href="/">⬅ Quay lại</a>
<video controls id="player"></video>

<script>
  const params = new URLSearchParams(window.location.search);
  const video = params.get('video');
  document.getElementById('player').src = video;
</script>

</body>
</html>
